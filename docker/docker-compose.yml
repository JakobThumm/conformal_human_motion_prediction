version: '3.8'

services:
  conformal-hmp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - USER_ID=${USER_ID:-1000}
        - GROUP_ID=${GROUP_ID:-1000}
        - USERNAME=${USERNAME:-user}
    image: conformal-hmp:latest
    container_name: chmp-dev

    # Enable GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Mount the codebase
    volumes:
      - ..:/workspace:rw
      # Optional: Mount models directory if it exists outside the repo
      - ../../models:/models:rw
      # Optional: Preserve bash history
      - bash_history:/home/${USERNAME:-user}/.bash_history

    # Set working directory
    working_dir: /workspace

    # Keep container running
    stdin_open: true
    tty: true

    # Environment variables
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
      # The GPU is often shared -> avoid JAX's 75% pre-allocation OOM
      - XLA_PYTHON_CLIENT_PREALLOCATE=false
      # User configuration for entrypoint
      - LOCAL_USER_ID=${USER_ID:-1000}
      - LOCAL_GROUP_ID=${GROUP_ID:-1000}
      - LOCAL_USERNAME=${USERNAME:-user}

    # Keep the detached container alive
    command: sleep infinity

volumes:
  bash_history:
